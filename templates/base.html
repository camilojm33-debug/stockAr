<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>stockAr</title>

<style>
body{
    background:#020617;
    color:white;
    font-family:Arial;
    margin:0;
}

/* NAV */
.nav{
    background:#0f172a;
    padding:15px;
    display:flex;
    justify-content:space-around;
    border-bottom:1px solid #1e293b;
}

.nav a{
    color:white;
    text-decoration:none;
    font-size:14px;
}

/* CONTENEDOR */
.container{
    padding:20px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

/* CARDS */
.card{
    background:#0f172a;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    margin-bottom:15px;
}

/* COLORES */
.blue{background:#1e3a8a;}
.green{background:#065f46;}
.purple{background:#4c1d95;}
.orange{background:#9a3412;}

/* BOTONES */
.btn{
    background:#22c55e;
    border:none;
    padding:15px;
    border-radius:10px;
    color:white;
    width:100%;
    font-size:16px;
    margin-top:10px;
    cursor:pointer;
}

.btn:hover{
    background:#16a34a;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:none;
    outline:none;
}
</style>
</head>

<body>

<div class="nav">
    <a href="/">🏠 Inicio</a>
    <a href="/productos">📦 Productos</a>
    <a href="/qr_config">🏷 QR</a>
    <a href="/historial">📊 Historial</a>
</div>

<div class="container">
{% block content %}{% endblock %}
</div>

</body>
</html>
