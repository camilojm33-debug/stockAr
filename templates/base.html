<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/static/manifest.json">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#0f172a;
    height:100vh;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    padding:12px;
    text-decoration:none;
    margin-bottom:5px;
    border-radius:8px;
}

.sidebar a:hover{
    background:#1e293b;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

/* CARDS */
.card{
    background:#0f172a;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

/* COLORES */
.blue{background:#1d4ed8;}
.green{background:#16a34a;}
.purple{background:#9333ea;}
.orange{background:#ea580c;}

.btn{
    background:#22c55e;
    border:none;
    padding:12px;
    color:white;
    border-radius:8px;
    width:100%;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>📦 stockAr</h2>

<a href="/">🏠 Inicio</a>
<a href="/productos">📦 Productos</a>
<a href="/scanner">📷 Escanear</a>
<a href="/historial">📊 Historial</a>
<a href="/qr_config">🧾 Etiquetas</a>

</div>

<div class="main">
{% block content %}{% endblock %}
</div>

</body>
</html>
