<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/static/manifest.json">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/service-worker.js');
}
</script>

<style>
  .btn{
    background:linear-gradient(135deg,#22c55e,#16a34a);
}

.header{
    letter-spacing:1px;
}

.card{
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}
body{background:#020617;color:white;font-family:Arial;margin:0;}
.header{background:#0f172a;padding:20px;text-align:center;font-size:24px;}
.card{background:#0f172a;margin:12px;padding:18px;border-radius:15px;}
.btn{background:#22c55e;padding:15px;border:none;width:100%;color:white;border-radius:10px;}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;}
</style>
</head>
<body>

<div class="header">📦 stockAr PRO</div>

{% block content %}{% endblock %}

<div class="nav">
<a href="/">🏠</a>
<a href="/scanner">📷</a>
<a href="/historial">📊</a>
<a href="/qr">🧾</a>
</div>

</body>
</html>
