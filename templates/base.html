<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stockAr</title>

<link rel="manifest" href="/static/manifest.json">

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/service-worker.js');
}
</script>

<style>
body{
    background:#020617;
    color:white;
    font-family:Arial;
    margin:0;
}

.header{
    background:#0f172a;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.card{
    background:#0f172a;
    margin:12px;
    padding:18px;
    border-radius:16px;
}

.btn{
    background:#22c55e;
    border:none;
    padding:16px;
    border-radius:10px;
    color:white;
    width:100%;
    margin-top:8px;
    font-size:18px;
}

.btn2{background:#3b82f6;}
.btn3{background:#f59e0b;}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:10px;
    border:none;
}

.nav{
    display:flex;
    justify-content:space-around;
    background:#020617;
    padding:12px;
    position:fixed;
    bottom:0;
    width:100%;
}

.nav a{
    color:white;
    text-decoration:none;
    font-size:20px;
}
.alert{
    background:#ef4444;
    padding:12px;
    border-radius:10px;
    margin:10px;
}
</style>
</head>

<body>

<div class="header">📦 stockAr PRO</div>

{% block content %}{% endblock %}

<div class="nav">
    <a href="/">🏠</a>
    <a href="/scanner">📷</a>
    <a href="/historial">📊</a>
    <a href="/qr">🧾</a>
</div>

</body>
</html>
