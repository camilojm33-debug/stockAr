{% extends "base.html" %}
{% block content %}

<div class="card">
<h3>📊 Historial de ventas</h3>
<p>Revisá todas las ventas realizadas</p>

{% for v in ventas %}
<div style="margin-bottom:12px; border-bottom:1px solid #1e293b; padding-bottom:8px;">
<b>{{v[0]}}</b> - ${{v[1]}}<br>
<small>{{v[2]}}</small>
</div>
{% endfor %}

</div>

{% endblock %}
