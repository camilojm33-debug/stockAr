<!DOCTYPE html>
<html>
<head>
<title>stockAr</title>
</head>
<body style="background:#020617;color:white;font-family:Arial;">

<h2>📦 stockAr</h2>
<a href="/logout">Cerrar sesión</a>

<h3>Agregar producto</h3>
<form action="/agregar" method="POST">
<input name="codigo" placeholder="Código"><br>
<input name="nombre" placeholder="Nombre"><br>
<input name="cantidad" type="number" placeholder="Cantidad"><br>
<button>Agregar</button>
</form>

<h3>Inventario</h3>

{% for p in productos %}
<div>
<b>{{p.nombre}}</b> ({{p.cantidad}})
<br>
<a href="/sumar/{{p.codigo}}">➕</a>
<a href="/restar/{{p.codigo}}">➖</a>
</div>
{% endfor %}

</body>
</html>
