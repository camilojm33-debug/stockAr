{% extends "base.html" %}

{% block content %}

<div class="card">
<h3>➕ Agregar producto</h3>

<form action="/agregar" method="POST">
<input name="codigo" placeholder="Código"><br>
<input name="nombre" placeholder="Nombre"><br>
<input name="categoria" placeholder="Categoría"><br>
<input name="cantidad" placeholder="Cantidad"><br>
<input name="precio" placeholder="Precio"><br>

<button>Guardar</button>
</form>
</div>

<div class="card">
<h3>📋 Inventario</h3>

{% for p in productos %}
<p>{{p[1]}} - ${{p[4]}}</p>

<a href="/carrito/{{p[0]}}">
<button>Vender</button>
</a>

{% endfor %}
</div>

<div class="card">
<h3>🛒 Carrito</h3>

{% for i in carrito %}
<p>{{i.nombre}} - ${{i.precio}}</p>
{% endfor %}

<a href="/finalizar">
<button>Finalizar</button>
</a>

</div>

{% endblock %}
