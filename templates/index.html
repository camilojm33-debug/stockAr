<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stockAr</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
}

.header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: 600;
}

.app {
    max-width: 420px;
    margin: auto;
    padding: 10px;
}

.card {
    background: #1e293b;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    background: #334155;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

.btn-add { background: #22c55e; }
.btn-sum { background: #3b82f6; }
.btn-sell { background: #ef4444; }

.item {
    background: #334155;
    border-radius: 12px;
    padding: 12px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.actions button {
    width: auto;
    padding: 6px 10px;
    margin-left: 5px;
}

/* SCANNER */
#reader {
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
}
</style>
</head>

<body>

<div class="header">📦 stockAr</div>

<div class="app">

    <!-- SCANNER -->
    <div class="card">
        <h3>📷 Escanear producto</h3>
        <div id="reader"></div>
        <p id="resultado"></p>
    </div>

    <!-- AGREGAR -->
    <div class="card">
        <h3>➕ Nuevo producto</h3>

        <form action="/agregar" method="POST">
            <input type="text" name="codigo" id="codigo" value="{{ request.args.get('nuevo','') }}" placeholder="Código" required>
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="number" name="cantidad" placeholder="Cantidad" required>
            <button class="btn-add">Agregar</button>
        </form>
    </div>

    <!-- INVENTARIO -->
    <div class="card">
        <h3>📋 Inventario</h3>

        {% for p in productos %}
        <div class="item">
            <span>{{ p.nombre }} ({{ p.cantidad }})</span>

            <div class="actions">
                <a href="/sumar/{{ p.codigo }}">
                    <button class="btn-sum">+</button>
                </a>

                <a href="/restar/{{ p.codigo }}">
                    <button class="btn-sell">-</button>
                </a>
            </div>
        </div>
        {% endfor %}

    </div>

</div>

<script>
function onScanSuccess(decodedText) {

    document.getElementById("resultado").innerText = "Código: " + decodedText;

    let accion = prompt(
        "Código: " + decodedText + "\\n\\n" +
        "1 = Vender\\n" +
        "2 = Agregar stock"
    );

    if (accion === "1") {
        window.location.href = "/restar/" + decodedText;
    }
    else if (accion === "2") {
        // 🔥 ACA ESTA EL FIX
        window.location.href = "/?nuevo=" + decodedText;
    }
    else {
        alert("Acción cancelada");
    }
}

let scanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
);

scanner.render(onScanSuccess);
</script>

</body>
</html>
