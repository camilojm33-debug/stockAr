{ase.html" %}
{% block content %}

<h2>📊 Panel de control</h2>

<div class="grid">

<div class="card blue">
<h3>Productos</h3>
<p>{{productos|length}}</p>
</div>

<div class="card green">
<h3>Ventas</h3>
<p>{{cantidad_ventas}}</p>
</div>

<div class="card purple">
<h3>Ingresos</h3>
<p>${{total}}</p>
</div>

<div class="card orange">
<h3>Stock bajo</h3>
<p>{{alertas|length}}</p>
</div>

</div>

<div class="card">
<h3>➕ Agregar producto</h3>

<form method="POST" action="/agregar">
<input name="nombre" placeholder="Nombre" required>
<input name="categoria" placeholder="Categoría" required>
<input name="cantidad" type="number" placeholder="Stock" required>
<input name="precio" type="number" placeholder="Precio" required>

<button class="btn" type="submit">💾 Guardar producto</button>
</form>
</div>

{% endblock %}% extends "b
