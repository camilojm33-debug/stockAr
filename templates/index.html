<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="/static/manifest.json">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

.card {
background:#0f172a;
padding:15px;
margin:10px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

button {
padding:12px;
margin:5px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
width:90%;
}

.btn-add{background:#22c55e;}
.btn-sum{background:#3b82f6;width:auto;}
.btn-sell{background:#ef4444;width:auto;}
.btn-qr{background:#a855f7;}

.item {
background:#1e293b;
padding:10px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<h2>📦 stockAr</h2>

<!-- 🔥 BOTÓN RESUMEN -->
<a href="/resumen">
<button class="btn-qr">📊 Ver resumen</button>
</a>

<a href="/historial">
<button class="btn-qr">📊 Historial</button>
</a>

<!-- PRODUCTO -->
<div class="card">
<h3>➕ Producto</h3>

<form action="/agregar" method="POST">
<input name="codigo" placeholder="Código"><br>
<input name="nombre" placeholder="Nombre"><br>
<input name="categoria" placeholder="Categoría"><br>
<input name="cantidad" type="number" placeholder="Cantidad"><br>
<input name="precio" type="number" placeholder="Precio"><br>
<button class="btn-add">Agregar</button>
</form>
</div>

<!-- INVENTARIO -->
<div class="card">
<h3>📋 Inventario</h3>

{% for p in productos %}
<div class="item">
<b>{{p[1]}}</b><br>
Stock: {{p[3]}}<br>
$ {{p[4]}}<br>

<a href="/carrito/{{p[0]}}">
<button class="btn-sell">🛒</button>
</a>
</div>
{% endfor %}
</div>

<!-- CARRITO -->
<div class="card">
<h3>🛒 Carrito</h3>

{% for item in carrito %}
<p>{{item.nombre}} - ${{item.precio}}</p>
{% endfor %}

<a href="/finalizar">
<button onclick="notificar()" class="btn-add">💰 Finalizar</button>
</a>
</div>

<script>
// NOTIFICACIONES
if ("Notification" in window) {
 Notification.requestPermission();
}

function notificar(){
 if(Notification.permission==="granted"){
   new Notification("Venta realizada 💰");
 }
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('/static/service-worker.js')
}
</script>

</body>
</html>
