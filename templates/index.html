<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {background:#020617;color:white;font-family:Arial;text-align:center;}

.card {background:#0f172a;padding:15px;margin:10px;border-radius:10px;}

button {padding:10px;margin:5px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}

.btn-add{background:#22c55e;}
.btn-sum{background:#3b82f6;}
.btn-sell{background:#ef4444;}
.btn-qr{background:#a855f7;}

.item{background:#1e293b;padding:10px;margin-top:10px;border-radius:10px;}

#a4Container{display:none;background:white;color:black;padding:20px;}
.grid{display:grid;grid-template-columns: repeat(4, 1fr);gap:10px;}
.label{text-align:center;border:1px dashed black;padding:10px;}
</style>
</head>

<body>

<h2>📦 stockAr</h2>

<a href="/historial">
<button class="btn-qr">📊 Historial</button>
</a>

<div class="card">
<h3>➕ Producto</h3>
<form action="/agregar" method="POST">
<input name="codigo" placeholder="Código" required><br>
<input name="nombre" placeholder="Nombre" required><br>
<input name="cantidad" type="number" placeholder="Cantidad" required><br>
<input name="precio" type="number" placeholder="Precio" required><br>
<button class="btn-add">Agregar</button>
</form>
</div>

<div class="card">
<h3>🖨 QR A4</h3>

<input id="a4_codigo" placeholder="Código"><br>
<input id="a4_nombre" placeholder="Nombre"><br>
<input id="a4_precio" type="number" placeholder="Precio"><br>
<input id="a4_cantidad" type="number" placeholder="Cantidad"><br>

<button class="btn-qr" onclick="generarA4()">Generar</button>
<button onclick="window.print()">Imprimir</button>
</div>

<div id="a4Container">
<div class="grid" id="a4Grid"></div>
</div>

<div class="card">
<h3>📋 Inventario</h3>

{% for p in productos %}
<div class="item">
<b>{{p.nombre}}</b><br>
Stock: {{p.cantidad}} <br>
$ {{p.precio}}

<br>

<a href="/sumar/{{p.codigo}}">
<button class="btn-sum">+</button>
</a>

<a href="/carrito/{{p.codigo}}">
<button class="btn-sell">Agregar</button>
</a>

</div>
{% endfor %}
</div>

<div class="card">
<h3>🛒 Carrito</h3>

{% for item in carrito %}
<p>{{item.nombre}} - ${{item.precio}}</p>
{% endfor %}

<a href="/finalizar">
<button class="btn-add">Finalizar compra</button>
</a>
</div>

<script>
function generarA4(){
let c = a4_codigo.value;
let n = a4_nombre.value;
let p = a4_precio.value;
let cantidad = parseInt(a4_cantidad.value);

let grid = document.getElementById("a4Grid");
grid.innerHTML="";

let data = c+"|"+n+"|"+p;

for(let i=0;i<cantidad;i++){
let div = document.createElement("div");
div.className="label";
div.innerHTML=`<div id="qr${i}"></div><p>${n}</p><p>$${p}</p>`;
grid.appendChild(div);
new QRCode(div.querySelector(`#qr${i}`), data);
}

a4Container.style.display="block";
}
</script>

</body>
</html>
