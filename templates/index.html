<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stockAr</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.app {
    width: 100%;
    max-width: 420px;
    padding: 20px;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    margin-bottom: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
    background: #334155;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

.btn-add { background: #22c55e; }
.btn-sell { background: #ef4444; }
.btn-sum { background: #3b82f6; }

.item {
    background: #334155;
    border-radius: 12px;
    padding: 12px;
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.actions button {
    width: auto;
    padding: 6px 10px;
    margin-left: 5px;
}

.scanner {
    text-align: center;
    padding: 20px;
    border: 2px dashed #475569;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="app">

    <div class="card">
        <h1>📦 stockAr</h1>
        <div class="subtitle">Control simple de inventario</div>
    </div>

    <div class="card">
        <h3>📷 Escanear</h3>
        <div class="scanner">
            (Próximamente QR)
        </div>
    </div>

    <div class="card">
        <h3>➕ Agregar producto</h3>

        <form action="/agregar" method="POST">
            <input type="text" name="codigo" placeholder="Código" required>
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="number" name="cantidad" placeholder="Cantidad" required>
            <button class="btn-add">Agregar producto</button>
        </form>
    </div>

    <div class="card">
        <h3>📋 Inventario</h3>

        {% for p in productos %}
        <div class="item">
            <span>{{ p.nombre }} ({{ p.cantidad }})</span>

            <div class="actions">
                <a href="/sumar/{{ p.codigo }}">
                    <button class="btn-sum">+</button>
                </a>

                <a href="/restar/{{ p.codigo }}">
                    <button class="btn-sell">-</button>
                </a>
            </div>
        </div>
        {% endfor %}

    </div>

</div>

</body>
</html>
