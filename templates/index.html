<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {background:#020617;color:white;font-family:Arial;text-align:center;}
.card {background:#1e293b;padding:15px;margin:10px;border-radius:10px;}
button {padding:10px;margin:5px;border:none;border-radius:8px;font-weight:bold;}
.btn-add{background:#22c55e;}
.btn-sum{background:#3b82f6;}
.btn-sell{background:#ef4444;}
.btn-ticket{background:#f59e0b;}
.item{background:#334155;padding:10px;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<h2>📦 stockAr</h2>
<a href="/logout">Cerrar sesión</a>

<div class="card">
<h3>📷 Escanear</h3>
<div id="reader"></div>
</div>

<div class="card">
<h3>➕ Producto</h3>
<form action="/agregar" method="POST">
<input name="codigo" placeholder="Código"><br>
<input name="nombre" placeholder="Nombre"><br>
<input name="cantidad" type="number" placeholder="Cantidad"><br>
<input name="precio" type="number" placeholder="Precio"><br>
<button class="btn-add">Agregar</button>
</form>
</div>

<div class="card">
<h3>📋 Inventario</h3>
<button class="btn-ticket" onclick="ticket()">🎟 Ticket</button>

{% for p in productos %}
<div class="item">
<b>{{p.nombre}}</b><br>
Stock: {{p.cantidad}}<br>
$ {{p.precio}}

<br>

<a href="/sumar/{{p.codigo}}"><button class="btn-sum">+</button></a>
<button class="btn-sell" onclick="vender('{{p.codigo}}','{{p.nombre}}',{{p.precio}})">Vender</button>
<button onclick="qr('{{p.codigo}}')">QR</button>
</div>
{% endfor %}
</div>

<div id="qrcode"></div>

<script>
let ventas=[];

function vender(c,n,p){
ventas.push({n,p});
location="/restar/"+c;
}

function ticket(){
let total=0;
let html="<h2>Ticket</h2>";
ventas.forEach(v=>{
html+=`<p>${v.n} - $${v.p}</p>`;
total+=v.p;
});
html+=`<h3>Total: $${total}</h3>`;
let w=window.open();
w.document.write(html);
w.print();
}

function qr(c){
document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),c);
}

let scanner=new Html5QrcodeScanner("reader",{fps:10,qrbox:250});
scanner.render(code=>{
let a=prompt("1 vender | 2 agregar");
if(a=="1"){location="/restar/"+code;}
if(a=="2"){location="/?nuevo="+code;}
});
</script>

</body>
</html>
