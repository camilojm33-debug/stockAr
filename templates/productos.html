{% extends "base.html" %}
{% block content %}

<h2>📦 Productos</h2>

{% for p in productos %}
<div class="card">

<b>{{p[3]}}</b><br>
Precio: ${{p[6]}}<br>
Stock: {{p[5]}}

<br><br>

<a href="/carrito/{{p[2]}}">
<button class="btn">🛒 Agregar al carrito</button>
</a>

<a href="/finalizar">
<button class="btn">💳 Finalizar venta</button>
</a>

<a href="/qr_individual/{{p[2]}}">
<button class="btn">📦 QR</button>
</a>

<a href="/vender/{{p[2]}}">
<button class="btn">💸 Vender directo</button>
</a>

</div>
{% endfor %}

{% endblock %}
