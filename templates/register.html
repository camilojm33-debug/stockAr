<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - stockAr</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    text-align: center;
    color: white;
}

.logo {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: #334155;
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    background: #3b82f6;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

a {
    color: #38bdf8;
    font-size: 13px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">📦 stockAr</div>
    <div class="subtitle">Crear cuenta</div>

    <form method="POST">
        <input name="username" placeholder="Usuario" required>
        <input name="password" type="password" placeholder="Contraseña" required>
        <button>Registrarse</button>
    </form>

    <br>
    <a href="/login">Volver al login</a>

</div>

</body>
</html>
