<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#0f172a;
padding:30px;
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
width:300px;
text-align:center;
}

input{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#a855f7;
color:white;
font-weight:bold;
width:95%;
}
</style>
</head>

<body>

<div class="box">
<h2>🆕 Crear cuenta</h2>

<form method="POST">
<input name="username" placeholder="Usuario"><br>
<input name="password" type="password" placeholder="Contraseña"><br>
<button>Registrarse</button>
</form>

</div>

</body>
</html>
