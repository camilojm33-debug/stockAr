{% extends "base.html" %}
{% block content %}

<div class="card">
<h3>📷 Escanear QR</h3>

<div id="reader"></div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
function onScanSuccess(decodedText){
    window.location.href = "/carrito/" + decodedText;
}

new Html5Qrcode("reader").start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
);
</script>

{% endblock %}
